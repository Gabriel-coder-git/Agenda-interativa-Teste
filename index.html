<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-header"></div>

    <h1>Minha Agenda</h1>

    <!-- Seletor de data -->
    <input type="date" id="datePicker">

    <!-- Tabela -->
    <table id="agenda">
        <thead>
            <tr>
                <th>Horário</th>
                <th>Seg</th>
                <th>Ter</th>
                <th>Qua</th>
                <th>Qui</th>
                <th>Sex</th>
            </tr>
        </thead>
        <tbody id="agendaBody"></tbody>
    </table>

    <script src="script.js"></script>
</body>

</html>
